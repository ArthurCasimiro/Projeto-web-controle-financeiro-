{% extends "base.html" %}
{% block titulo %}{{ 'Editar' if boleto else 'Novo' }} Boleto — FinTrack{% endblock %}

{% block conteudo %}
<div class="pg-hd">
  <div class="pg-title">{{ 'Editar boleto' if boleto else 'Novo boleto' }}</div>
  <div class="pg-sub">Cadastre um boleto para receber alertas de vencimento</div>
</div>

<div class="sec" style="max-width:560px">
  <div class="sec-body">
    <form action="{{ url_for('boleto.editar', boleto_id=boleto.id) if boleto else url_for('boleto.cadastrar') }}" method="post">

      <div class="grid2">
        <div class="field">
          <label class="label">Nome *</label>
          <input class="inp" type="text" name="nome"
                 value="{{ boleto.nome if boleto else '' }}"
                 placeholder="IPTU, Água, IPVA..." required autofocus>
        </div>
        <div class="field">
          <label class="label">Categoria</label>
          <select class="sel" name="categoria_id">
            <option value="">Sem categoria</option>
            {% for c in categorias %}
            <option value="{{ c.id }}" {{ 'selected' if boleto and boleto.categoria_id == c.id }}>
              {{ c.icone }} {{ c.nome }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label class="label">Valor (R$) *</label>
          <input class="inp" type="number" name="valor" step="0.01" min="0"
                 value="{{ boleto.valor if boleto else '' }}"
                 placeholder="186.50" required>
        </div>
        <div class="field">
          <label class="label">Data de vencimento *</label>
          <input class="inp" type="date" name="vencimento"
                 value="{{ boleto.vencimento.strftime('%Y-%m-%d') if boleto else '' }}"
                 required>
        </div>
      </div>

      <div class="field">
        <label class="label">Descrição / referência</label>
        <input class="inp" type="text" name="descricao"
               value="{{ boleto.descricao if boleto else '' }}"
               placeholder="Ex: Parcela 3/10, Março 2026...">
      </div>

      <div class="field">
        <label class="label">Código de barras</label>
        <input class="inp" type="text" name="codigo_barra"
               value="{{ boleto.codigo_barra if boleto else '' }}"
               placeholder="Opcional — facilita o pagamento"
               style="font-family:var(--mono);font-size:12px">
      </div>

      <div class="field">
        <label class="label">Notas</label>
        <input class="inp" type="text" name="notas"
               value="{{ boleto.notas if boleto else '' }}"
               placeholder="Informações adicionais...">
      </div>

      <div class="modal-foot" style="padding-top:16px;border-top:1px solid var(--border)">
        <a href="{{ url_for('boleto.listar') }}" class="btn btn-ghost">Cancelar</a>
        <button type="submit" class="btn btn-amber">Salvar boleto</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
