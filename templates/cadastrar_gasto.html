{% extends "base.html" %}
{% block titulo %}{{ 'Editar' if gasto else 'Novo' }} Gasto — FinTrack{% endblock %}

{% block conteudo %}
<div class="pg-hd">
  <div class="pg-title">{{ 'Editar' if gasto else 'Novo' }} gasto</div>
  <div class="pg-sub">Registre uma despesa fixa ou variável</div>
</div>

<div class="sec" style="max-width:560px">
  <div class="sec-body">
    <form action="{{ url_for('gasto.editar', gasto_id=gasto.id) if gasto else url_for('gasto.cadastrar') }}" method="post">

      <div class="field">
        <label class="label">Descrição *</label>
        <input class="inp" type="text" name="descricao"
               value="{{ gasto.descricao if gasto else '' }}"
               placeholder="Conta de luz, aluguel..." required autofocus>
      </div>

      <div class="grid2">
        <div class="field">
          <label class="label">Valor (R$) *</label>
          <input class="inp" type="number" name="valor" step="0.01" min="0"
                 value="{{ gasto.valor if gasto else '' }}"
                 placeholder="150.00" required>
        </div>
        <div class="field">
          <label class="label">Categoria</label>
          <select class="sel" name="categoria_id">
            <option value="">Sem categoria</option>
            {% for c in categorias %}
            <option value="{{ c.id }}" {{ 'selected' if gasto and gasto.categoria_id == c.id }}>
              {{ c.icone }} {{ c.nome }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label class="label">Data *</label>
          <input class="inp" type="date" name="data"
                 value="{{ gasto.data.strftime('%Y-%m-%d') if gasto else today }}"
                 required>
        </div>
        <div class="field">
          <label class="label">Tipo *</label>
          <select class="sel" name="recorrente">
            <option value="false" {{ 'selected' if not gasto or not gasto.recorrente }}>Variável</option>
            <option value="true"  {{ 'selected' if gasto and gasto.recorrente }}>Fixo / Recorrente</option>
          </select>
        </div>
      </div>

      <div class="modal-foot" style="padding-top:16px;border-top:1px solid var(--border)">
        <a href="{{ url_for('gasto.listar') }}" class="btn btn-ghost">Cancelar</a>
        <button type="submit" class="btn btn-amber">Salvar gasto</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
