{% extends "base.html" %}
{% block titulo %}{{ 'Editar' if assinatura else 'Nova' }} Assinatura — FinTrack{% endblock %}

{% block conteudo %}
<div class="pg-hd">
  <div class="pg-title">{{ 'Editar' if assinatura else 'Nova' }} assinatura</div>
  <div class="pg-sub">Registre um serviço recorrente</div>
</div>

<div class="sec" style="max-width:560px">
  <div class="sec-body">
    <form action="{{ url_for('assinatura.editar', assinatura_id=assinatura.id) if assinatura else url_for('assinatura.cadastrar') }}" method="post">

      <div class="grid2">
        <div class="field">
          <label class="label">Nome do serviço *</label>
          <input class="inp" type="text" name="nome"
                 value="{{ assinatura.nome if assinatura else '' }}"
                 placeholder="Netflix, Spotify..." required autofocus>
        </div>
        <div class="field">
          <label class="label">Categoria</label>
          <select class="sel" name="categoria_id">
            <option value="">Sem categoria</option>
            {% for c in categorias %}
            <option value="{{ c.id }}" {{ 'selected' if assinatura and assinatura.categoria_id == c.id }}>
              {{ c.icone }} {{ c.nome }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label class="label">Valor (R$) *</label>
          <input class="inp" type="number" name="valor" step="0.01" min="0"
                 value="{{ assinatura.valor if assinatura else '' }}"
                 placeholder="39.90" required>
        </div>
        <div class="field">
          <label class="label">Ciclo *</label>
          <select class="sel" name="ciclo">
            <option value="mensal" {{ 'selected' if not assinatura or assinatura.ciclo == 'mensal' }}>Mensal</option>
            <option value="anual"  {{ 'selected' if assinatura and assinatura.ciclo == 'anual' }}>Anual</option>
          </select>
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label class="label">Dia do vencimento *</label>
          <input class="inp" type="number" name="dia_vencimento" min="1" max="31"
                 value="{{ assinatura.dia_vencimento if assinatura else 1 }}" required>
        </div>
        <div class="field">
          <label class="label">Desde</label>
          <input class="inp" type="date" name="desde"
                 value="{{ assinatura.desde.strftime('%Y-%m-%d') if assinatura and assinatura.desde else '' }}">
        </div>
      </div>

      <div class="field">
        <label class="label">Notas</label>
        <input class="inp" type="text" name="notas"
               value="{{ assinatura.notas if assinatura else '' }}"
               placeholder="Plano, detalhes adicionais...">
      </div>

      <div class="modal-foot" style="padding-top:16px;border-top:1px solid var(--border)">
        <a href="{{ url_for('assinatura.listar') }}" class="btn btn-ghost">Cancelar</a>
        <button type="submit" class="btn btn-amber">Salvar assinatura</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
